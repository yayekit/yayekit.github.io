const COURSE = {"id":"on7xtn0","level":"All levels","title":"Working With Data Platforms","modules":"7","chapters":[{"id":"wqo2zgz","tier":"Foundation","title":"Introduction","slides":[{"id":"susznh5","body":"<p>DataForest builds enterprise data platforms for companies navigating some of the most complex data challenges in their industries \u2014 post-acquisition integration, massive-scale billing reconciliation, healthcare revenue cycle analytics.</p><p>Every engagement is different. The architecture underneath them is not.</p><p>This course gives you the conceptual foundation to understand what we build and why \u2014 before you sit in your first client call, review your first pipeline, or write your first ticket.</p><p>This course is designed for everyone joining DataForest, regardless of role or technical background.</p><p>You will not be asked to write code or configure a pipeline.</p><p>You will be asked to think about data problems the way DataForest thinks about them: starting with the business question, not the technical solution.</p>","image":null,"heading":"Welcome to DataForest","quizzes":[]},{"id":"j4jesm5","body":"<p>Seven modules, 84 minutes, one narrative thread. Each module builds on the last. All of them connect to real DataForest projects.</p><p>The course is built around three active DataForest client engagements: RMC-Norkem, a chemical manufacturer integrating three acquired companies; NexGen Cloud, a GPU infrastructure platform; and Sagis Diagnostics, a pathology and toxicology lab navigating HIPAA-compliant analytics.</p><p><strong>How assessment works</strong></p><p>Each of the first six modules ends with a short scenario-based question. The seventh module is a single branching scenario that runs for approximately 15 minutes.</p>","image":null,"heading":"Course & assessment structure","quizzes":[]}],"duration":"3 minutes"},{"id":"p4iyplf","tier":"Foundation","title":"Module 1: Why We Build Data Platforms","slides":[{"id":"ovixb2s","body":"<p>Before we get into architectures, pipelines, or any technical detail, we need to answer a more basic question: why does any of this exist?</p><p>Every data platform DataForest builds was built because someone, somewhere, could not answer a question they needed to answer. And the cost of not knowing that answer had become too high to ignore.</p><p>That\u2019s the premise this entire course builds on: a data platform gets built when the cost of not knowing something exceeds the cost of building the infrastructure to know it.</p>","image":null,"heading":"Intro","quizzes":[]},{"id":"ybes0mv","body":"<p>A private equity firm acquires two chemical companies \u2014 RMC and Norkem. The fund\u2019s finance team needs to report combined revenue to its investors.</p><p>RMC runs on one ERP system. Norkem runs on another. Revenue figures are stored in different currencies, calculated on different methodologies, and labelled with different field names.</p><p>When the finance team asks: what is our combined revenue this quarter? \u2014 no one can answer it. Not because the data doesn\u2019t exist, but because it exists in a form that cannot be directly compared.</p><p>This is the moment a data platform becomes necessary \u2014 not as a technical project, but as a business requirement.</p>","image":null,"heading":"Story 1: The PE Acquisition \u2014 RMC-Norkem","quizzes":[]},{"id":"0dt9fvi","body":"<p>NexGen Cloud operates a GPU infrastructure platform. During a review of their billing data, 16.8 million billing records could not be matched to any price entry in the system.</p><p>No one knew whether these records represented real revenue risk. Because there was no analytical layer sitting above the raw billing data.</p><p>The cost of not knowing eventually exceeded the cost of building a system that could answer the question.</p>","image":null,"heading":"Story 2: The 16.8 Million Records \u2014 NexGen Cloud","quizzes":[]},{"id":"21o8hnh","body":"<p>Sagis Diagnostics runs a network of clinical labs. Claims data existed across multiple systems. There was no single place where the right person could see which claims have been denied and which are still recoverable.</p><p>The result was a slow, quiet erosion of recoverable revenue. The cost of not knowing was measured in real dollars quietly walking out the door every month.</p>","image":null,"heading":"Story 3: The Denial Revenue Erosion \u2014 Sagis Diagnostics","quizzes":[]},{"id":"8fr7y2q","body":"<p>Three industries. Three different problems. The same underlying pattern: information existed in a form that couldn\u2019t be used to make a decision.</p><p>That gap \u2014 between data that exists and insight that\u2019s usable \u2014 is what DataForest builds infrastructure to close.</p><p>Before you move on, here\u2019s a quick scenario.</p>","image":null,"heading":"The core idea","quizzes":[{"id":"fyc2z4n","type":"single","correct":[2],"options":[{"id":"3gwxv2n","text":"Check the Gold table filters \u2014 there may be a duplication or misconfigured aggregation.","feedback":"Both A and B are legitimate investigation steps, but with 10 minutes and a board call imminent, they\u2019re too slow."},{"id":"140lf2t","text":"Go back to Bronze-level source data and compare the raw figures from each ERP directly.","feedback":"Both A and B are legitimate investigation steps, but with 10 minutes and a board call imminent, they\u2019re too slow."},{"id":"p46rxtq","text":"Ask the domain expert which revenue recognition methodology was approved for the combined entity.","feedback":"The $8.4M discrepancy was a methodology difference. The fastest path to the root cause ran through the person who knew what the number was supposed to mean."}],"question":"Combined revenue is showing $8.4 million higher than expected. You have 10 minutes before a board call. What do you do?"}]},{"id":"o3qkzxu","body":"<p>A data platform encodes business decisions \u2014 about what to count, how to count it, and what the result should represent.</p><p>When numbers are wrong, the first question often isn\u2019t \u201cwhat broke in the pipeline?\u201d It\u2019s \u201cwhat business decision is this pipeline trying to reflect?\u201d</p><p>That question gets answered by a domain expert, not a SQL query.</p>","image":null,"heading":"The takeaway","quizzes":[]}],"duration":"10 minutes"}],"duration":"80 minutes","subtitle":"DataForest Foundational Course","description":"Prepared by DataForest Learning & Development"};

            <input type="text" id="name-input" placeholder="Your name" autofocus>
            <button class="btn btn-primary" style="width:100%" onclick="startCourse()">Start</button>
            <button class="btn" style="width:100%;margin-top:8px" onclick="screen='home';render()">Back</button>
        </div>
    </div>`;
}

function renderCourse() {
    const ch = COURSE.chapters[activeCh];
    const sl = ch.slides[activeSl];
    const completedCount = Object.keys(completed).length;
    const pct = Math.round((completedCount / allSlides.length) * 100);

    let quizHtml = '';
    if (sl.quizzes && sl.quizzes.length > 0) {
        sl.quizzes.forEach(q => {
            const ans = quizAnswers[q.id];
            quizHtml += `<div class="quiz-section">
                <div class="q-text">${q.question}</div>
                ${q.options.map((opt, i) => {
                    let cls = 'q-option';
                    if (ans !== undefined) {
                        if (q.correct.includes(i)) cls += ' correct';
                        else if (ans === i) cls += ' incorrect';
                    } else {
                        cls += '';
                    }
                    return `<div class="${cls}" onclick="answerQuiz('${q.id}',${i})">
                        <div class="q-radio"></div>
                        <div>${opt.text}</div>
                    </div>`;
                }).join('')}
                ${ans !== undefined ? `<div class="q-feedback ${q.correct.includes(ans)?'correct':'incorrect'}">${q.options[ans].feedback}</div>` : ''}
            </div>`;
        });
    }

    return `
    <div class="lesson">
        <div class="lesson-sidebar">
            <button class="back-btn" onclick="screen='home';render()">&larr; Back to courses</button>
            ${COURSE.chapters.map((c, ci) => `
                <div class="sidebar-ch">${c.title}</div>
                ${c.slides.map((s, si) => `
                    <button class="sidebar-slide ${ci===activeCh && si===activeSl ? 'active' : ''}" onclick="activeCh=${ci};activeSl=${si};render()">
                        ${completed[s.id] ? '<span class="check">\u2713</span>' : '<span style="color:#C4B9A8">\u25CB</span>'}
                        ${s.heading}
                    </button>
                `).join('')}
            `).join('')}
        </div>
        <div class="lesson-main">
            <h2>${sl.heading}</h2>
            <div class="slide-body">${sl.body}</div>
            ${quizHtml}
            <div class="lesson-nav">
                ${activeSl > 0 || activeCh > 0 ? `<button class="btn btn-sm" onclick="prevSlide()">Previous</button>` : '<div></div>'}
                <div class="slide-dots">
                    ${ch.slides.map((s, i) => `<div class="slide-dot ${i===activeSl?'active':''} ${completed[s.id]?'done':''}"></div>`).join('')}
                </div>
                <button class="btn btn-primary btn-sm" onclick="nextSlide()">${isLastSlide() ? 'Finish' : 'Next'}</button>
            </div>
        </div>
    </div>`;
}

function renderAdmin() {
    const totalSlides = allSlides.length;
    const completedLearners = USERS.filter(u => {
        const c = Object.keys(u.completed || {}).length;
        return c >= totalSlides;
    }).length;
    const avgProgress = USERS.length > 0
        ? Math.round(USERS.reduce((s,u) => s + (Object.keys(u.completed||{}).length / totalSlides * 100), 0) / USERS.length)
        : 0;

    return `
    <div class="header">
        <div class="header-left">
            <div class="label">Learning Platform</div>
            <div class="brand">DataForest</div>
        </div>
        <button class="btn btn-sm" onclick="screen='home';showPw=false;render()">Logout</button>
    </div>
    <div class="main" style="padding-top:0">
        <div class="admin-tabs">
            <button class="admin-tab ${adminTab==='projects'?'active':''}" onclick="adminTab='projects';render()">Projects</button>
            <button class="admin-tab ${adminTab==='results'?'active':''}" onclick="adminTab='results';render()">Results</button>
        </div>
        ${adminTab === 'projects' ? `
            <div class="admin-layout">
                <div class="admin-left">
                    <div class="admin-item active">
                        <span>${COURSE.title}</span>
                        <span class="tier-badge tier-foundation" style="font-size:9px">Foundation</span>
                    </div>
                </div>
                <div class="admin-right">
                    <div class="card">
                        <h3>${COURSE.title}</h3>
                        <div class="sub">${COURSE.subtitle} &mdash; ${COURSE.duration}</div>
                        <p style="color:#5C4F45;font-size:14px">${COURSE.chapters.length} chapters, ${totalSlides} slides</p>
                    </div>
                </div>
            </div>
        ` : `
            <div class="results-stats">
                <div class="stat-box">
                    <div class="stat-num">${USERS.length}</div>
                    <div class="stat-label">Learners</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">${completedLearners}</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">${avgProgress}%</div>
                    <div class="stat-label">Avg Progress</div>
                </div>
            </div>
            <table class="learner-table">
                <thead>
                    <tr><th>Name</th><th>Progress</th><th>Last seen</th></tr>
                </thead>
                <tbody>
                    ${USERS.map(u => {
                        const p = Math.round(Object.keys(u.completed||{}).length / totalSlides * 100);
                        const d = new Date(u.last_seen);
                        return `<tr>
                            <td>${u.name}</td>
                            <td>
                                <div style="display:flex;align-items:center;gap:8px">
                                    <div style="width:80px;height:5px;background:#EDE6D6;border-radius:3px;overflow:hidden">
                                        <div style="width:${p}%;height:100%;background:${p>=100?'#5C6B50':'#9E4F2E'};border-radius:3px"></div>
                                    </div>
                                    <span style="font-size:12px;color:#8C7E6E">${p}%</span>
                                </div>
                            </td>
                            <td style="color:#8C7E6E;font-size:13px">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        `}
    </div>`;
}

function tryAdmin() {
    const input = document.getElementById("pw-input");
    pwInput = input ? input.value : "";
    // VULNERABLE: client-side password comparison (replica of the real vulnerability)
    if (pwInput === ADMIN_PW) {
        screen = "admin";
        showPw = false;
        pwInput = "";
        pwErr = "";
    } else {
        pwErr = "Incorrect password.";
    }
    render();
}

function startCourse() {
    const input = document.getElementById("name-input");
    userName = input ? input.value.trim() : "";
    if (!userName) return;
    screen = "course";
    activeCh = 0;
    activeSl = 0;
    render();
}

function nextSlide() {
    const ch = COURSE.chapters[activeCh];
    const sl = ch.slides[activeSl];
    completed[sl.id] = true;
    if (activeSl < ch.slides.length - 1) {
        activeSl++;
    } else if (activeCh < COURSE.chapters.length - 1) {
        activeCh++;
        activeSl = 0;
    } else {
        screen = "home";
    }
    render();
}

function prevSlide() {
    if (activeSl > 0) {
        activeSl--;
    } else if (activeCh > 0) {
        activeCh--;
        activeSl = COURSE.chapters[activeCh].slides.length - 1;
    }
    render();
}

function isLastSlide() {
    return activeCh === COURSE.chapters.length - 1 && activeSl === COURSE.chapters[activeCh].slides.length - 1;
}

function answerQuiz(qid, idx) {
    if (quizAnswers[qid] !== undefined) return;
    quizAnswers[qid] = idx;
    render();
}

function bindEvents() {
    const pwInput = document.getElementById("pw-input");
    if (pwInput) {
        pwInput.focus();
        pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryAdmin(); });
    }
    const nameInput = document.getElementById("name-input");
    if (nameInput) {
        nameInput.focus();
        nameInput.addEventListener("keydown", e => { if (e.key === "Enter") startCourse(); });
    }
}

render();
</script>
</body>
</html>
