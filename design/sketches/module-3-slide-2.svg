<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <style>
    .ink       { stroke: #2C2520; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .ink-thin  { stroke: #2C2520; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .ground    { stroke: #2C2520; stroke-width: 6; fill: none; stroke-linecap: round; }
    .dot       { fill: #2C2520; }
    .terra     { fill: #9E4F2E; stroke: #2C2520; stroke-width: 3; }
    .flow      { stroke: #8C7E6E; stroke-width: 4; fill: none; stroke-linecap: round; stroke-dasharray: 2 12; }
    .label     { font-family: Georgia, serif; font-size: 20px; fill: #2C2520; }
    .sub       { font-family: Georgia, serif; font-size: 13px; fill: #5C4F45; font-style: italic; }
    .trust     { font-family: Georgia, serif; font-size: 16px; fill: #8C7E6E; font-style: italic; }
  </style>

  <rect width="900" height="480" fill="#F5F0E8"/>

  <!-- ─────────── GROUND LINE (wobbly) ─────────── -->
  <path class="ground" d="M 80 380 Q 250 384 450 379 T 820 381"/>

  <!-- ═══════════ BRONZE — small sparse tree ═══════════ -->
  <g transform="translate(180, 380)">
    <!-- trunk -->
    <path class="ink" d="M 0 0 C -2 -28 3 -56 -1 -88"/>
    <!-- 3 sparse branches -->
    <path class="ink" d="M 0 -32 C -16 -36 -28 -32 -36 -22"/>
    <circle class="dot" r="8" cx="-36" cy="-22"/>
    <path class="ink" d="M 0 -52 C 18 -56 30 -52 38 -42"/>
    <circle class="dot" r="8" cx="38" cy="-42"/>
    <path class="ink" d="M -1 -78 C -18 -84 -28 -82 -36 -76"/>
    <circle class="dot" r="8" cx="-36" cy="-76"/>
    <!-- crown -->
    <circle class="dot" r="10" cx="-1" cy="-100"/>
  </g>
  <text class="label" x="180" y="425" text-anchor="middle">BRONZE</text>
  <text class="sub"   x="180" y="445" text-anchor="middle">raw &amp; immutable</text>

  <!-- ═══════════ SILVER — medium tree ═══════════ -->
  <g transform="translate(440, 380)">
    <!-- trunk -->
    <path class="ink" d="M 0 0 C 3 -45 -3 -90 1 -150"/>
    <!-- 5 branches -->
    <path class="ink" d="M 1 -38 C -22 -42 -40 -36 -52 -22"/>
    <circle class="dot" r="9" cx="-52" cy="-22"/>
    <path class="ink" d="M 0 -55 C 24 -60 42 -54 56 -40"/>
    <circle class="dot" r="9" cx="56" cy="-40"/>
    <path class="ink" d="M 0 -82 C -26 -88 -46 -82 -58 -68"/>
    <circle class="dot" r="9" cx="-58" cy="-68"/>
    <path class="ink" d="M 1 -102 C 26 -108 46 -100 60 -88"/>
    <circle class="dot" r="9" cx="60" cy="-88"/>
    <path class="ink" d="M 0 -130 C -20 -138 -34 -140 -46 -134"/>
    <circle class="dot" r="9" cx="-46" cy="-134"/>
    <!-- crown -->
    <circle class="dot" r="11" cx="1" cy="-162"/>
  </g>
  <text class="label" x="440" y="425" text-anchor="middle">SILVER</text>
  <text class="sub"   x="440" y="445" text-anchor="middle">cleaned &amp; rule-applied</text>

  <!-- ═══════════ GOLD — full tall tree with terracotta crown ═══════════ -->
  <g transform="translate(720, 380)">
    <!-- trunk -->
    <path class="ink" d="M 0 0 C -3 -55 4 -120 -1 -220"/>
    <!-- 7 branches, fuller -->
    <path class="ink" d="M -1 -38 C -28 -44 -52 -38 -68 -22"/>
    <circle class="dot" r="10" cx="-68" cy="-22"/>
    <path class="ink" d="M 0 -58 C 30 -64 56 -56 74 -38"/>
    <circle class="dot" r="10" cx="74" cy="-38"/>
    <path class="ink" d="M -1 -88 C -32 -96 -58 -88 -76 -70"/>
    <circle class="dot" r="10" cx="-76" cy="-70"/>
    <path class="ink" d="M 0 -110 C 32 -118 58 -110 78 -90"/>
    <circle class="dot" r="10" cx="78" cy="-90"/>
    <path class="ink" d="M -1 -140 C -28 -150 -52 -150 -68 -134"/>
    <circle class="dot" r="10" cx="-68" cy="-134"/>
    <path class="ink" d="M 0 -162 C 26 -172 48 -172 64 -156"/>
    <circle class="dot" r="10" cx="64" cy="-156"/>
    <path class="ink" d="M -1 -190 C -20 -200 -32 -204 -42 -198"/>
    <circle class="dot" r="10" cx="-42" cy="-198"/>
    <!-- crown — THE accent -->
    <circle class="terra" r="16" cx="-1" cy="-238"/>
  </g>
  <text class="label" x="720" y="425" text-anchor="middle">GOLD</text>
  <text class="sub"   x="720" y="445" text-anchor="middle">shaped for the question</text>

  <!-- ─────── progression-of-trust dashed flow under the trees ─────── -->
  <path class="flow" d="M 230 400 Q 310 408 380 400"/>
  <path class="ink-thin" d="M 366 392 L 384 400 L 366 408"/>
  <path class="flow" d="M 500 400 Q 590 408 660 400"/>
  <path class="ink-thin" d="M 646 392 L 664 400 L 646 408"/>
  <text class="trust" x="450" y="475" text-anchor="middle">progression of trust →</text>
</svg>
