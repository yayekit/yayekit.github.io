<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <style>
    .ink       { stroke: #2C2520; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .ink-thin  { stroke: #2C2520; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .dot       { fill: #2C2520; }
    .terra     { fill: #9E4F2E; stroke: #2C2520; stroke-width: 3; }
    .gap       { stroke: #8C7E6E; stroke-width: 5; fill: none; stroke-linecap: round; stroke-dasharray: 2 14; }
    .label     { font-family: Georgia, serif; font-size: 18px; fill: #5C4F45; font-style: italic; }
    .gap-label { font-family: Georgia, serif; font-size: 15px; fill: #8C7E6E; font-style: italic; }
  </style>

  <rect width="800" height="420" fill="#F5F0E8"/>

  <!-- ─────── LEFT: chaotic tangle of raw data ─────── -->
  <g transform="translate(150, 200)">
    <!-- one continuous wobbly scribble -->
    <path class="ink" d="
      M -85 -20
      C -55 -75 0 -78 22 -38
      C 42 -2 -10 8 -52 28
      C -90 50 -42 82 8 60
      C 56 38 78 -8 50 -38
      C 22 -64 -38 -22 -8 12
      C 16 38 60 32 78 4"/>
    <!-- stray dots inside the tangle -->
    <circle class="dot" r="6" cx="-58" cy="-22"/>
    <circle class="dot" r="6" cx="22"  cy="-30"/>
    <circle class="dot" r="6" cx="58"  cy="6"/>
    <circle class="dot" r="6" cx="-12" cy="42"/>
    <circle class="dot" r="6" cx="-72" cy="48"/>
    <circle class="dot" r="6" cx="38"  cy="38"/>
    <circle class="dot" r="6" cx="-38" cy="-2"/>
  </g>
  <text class="label" x="150" y="350" text-anchor="middle">data that exists</text>

  <!-- ─────── MIDDLE: dashed gap with arrow ─────── -->
  <path class="gap" d="M 270 200 Q 400 168 540 200"/>
  <path class="ink-thin" d="M 522 184 L 545 200 L 522 216"/>
  <text class="gap-label" x="405" y="158" text-anchor="middle">the gap</text>

  <!-- ─────── RIGHT: ball-tipped tree = insight ─────── -->
  <g transform="translate(645, 295)">
    <!-- trunk: wobbly upward -->
    <path class="ink" d="M 0 0 C -3 -40 4 -80 -1 -160"/>

    <!-- branches (alternating, each ending in a dot) -->
    <!-- low-left -->
    <path class="ink" d="M -1 -40 C -22 -42 -42 -34 -56 -22"/>
    <circle class="dot" r="9" cx="-56" cy="-22"/>
    <!-- low-right -->
    <path class="ink" d="M 0 -55 C 22 -58 42 -50 60 -38"/>
    <circle class="dot" r="9" cx="60" cy="-38"/>
    <!-- mid-left -->
    <path class="ink" d="M -1 -85 C -28 -90 -50 -82 -64 -68"/>
    <circle class="dot" r="9" cx="-64" cy="-68"/>
    <!-- mid-right -->
    <path class="ink" d="M 0 -100 C 26 -106 50 -100 68 -86"/>
    <circle class="dot" r="9" cx="68" cy="-86"/>
    <!-- high-left -->
    <path class="ink" d="M -1 -130 C -22 -138 -38 -140 -52 -134"/>
    <circle class="dot" r="9" cx="-52" cy="-134"/>
    <!-- high-right -->
    <path class="ink" d="M 0 -142 C 20 -150 36 -154 50 -148"/>
    <circle class="dot" r="9" cx="50" cy="-148"/>

    <!-- crown — the terracotta accent -->
    <circle class="terra" r="13" cx="-1" cy="-172"/>
  </g>
  <text class="label" x="645" y="350" text-anchor="middle">insight you can use</text>
</svg>
